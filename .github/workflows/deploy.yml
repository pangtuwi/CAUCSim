name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down code - Updated from @v4 to @v5
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Set up Node - Updated from @v4 to @v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install only production dependencies
      - name: Install production dependencies
        run: npm ci --only=production

      # 4. Deploy using the Serverless Framework
      - name: Deploy to AWS Lambda
        uses: serverless/github-action@v3.2
        with:
          args: deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          DIGITALOCEAN_PROJECT_ID: ${{ secrets.DIGITALOCEAN_PROJECT_ID }}
          DIGITALOCEAN_SSH_KEY_FP: ${{ secrets.DIGITALOCEAN_SSH_KEY_FP }}
          DIGITALOCEAN_SNAPSHOT_NAME: ${{ secrets.DIGITALOCEAN_SNAPSHOT_NAME }}
          DIGITALOCEAN_REGION: ${{ secrets.DIGITALOCEAN_REGION }}
          DIGITALOCEAN_SIZE: ${{ secrets.DIGITALOCEAN_SIZE }}
          APP_CALLBACK_URL: ${{ secrets.APP_CALLBACK_URL }}